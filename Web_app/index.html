<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span>+</span>
          </div>
          <div>
            <h1>Medical Chatbot</h1>
            <p>Hạnh Phúc RAG · Pharmacity</p>
          </div>
        </div>
        <div class="brand-assets" aria-hidden="true">
          <img
            src="https://prod-cdn.pharmacity.io/e-com/images/static-website/pharmacity-logo.svg"
            alt=""
          />
        </div>
        <button id="newChatButton" class="icon-text-button" type="button">
          <span aria-hidden="true">↻</span>
          <span>Cuộc trò chuyện mới</span>
        </button>
      </header>

      <section class="chat-panel" aria-label="Medical chatbot">
        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="quick-prompts" aria-label="Câu hỏi nhanh">
          <button type="button" data-prompt="Hãy cho tôi biết thông tin về thuốc Oresol">
            Oresol
          </button>
          <button type="button" data-prompt="Gói IVF Standard gồm gì?">
            IVF Standard
          </button>
          <button type="button" data-prompt="Bác sĩ nào hỗ trợ sinh sản?">
            Bác sĩ hỗ trợ sinh sản
          </button>
        </div>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">Tin nhắn</label>
          <textarea
            id="messageInput"
            name="message"
            rows="1"
            placeholder="Nhập câu hỏi..."
            autocomplete="off"
          ></textarea>
          <button id="sendButton" class="send-button" type="submit" aria-label="Gửi">
            <span aria-hidden="true">➤</span>
          </button>
        </form>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>

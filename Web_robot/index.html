<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Robot Bệnh Viện</title>
    <link rel="stylesheet" href="/robot/static/styles.css?v=robot-1" />
  </head>
  <body>
    <main class="robot-frame" aria-label="Mobile robot bệnh viện">
      <section id="homeScreen" class="screen home-screen is-active" data-screen="home">
        <button id="guideButton" class="home-tool home-tool-left" type="button" aria-label="Mở hướng dẫn">
          <span class="icon-slot home-icon-slot">
            <img src="/robot/static/assets/Icon/huong_dan.png" alt="" data-optional-icon />
          </span>
          <span>Hướng dẫn</span>
        </button>

        <div class="home-title">
          <h1>Mobile robot</h1>
          <p id="clockText">Hiển thị ngày giờ</p>
        </div>

        <button id="doctorButton" class="home-tool home-tool-right" type="button" aria-label="Mở màn bác sĩ">
          <span class="icon-slot home-icon-slot">
            <img src="/robot/static/assets/Icon/Doctor.png" alt="" data-optional-icon />
          </span>
          <span>Bác sĩ</span>
        </button>

        <button id="medicineButton" class="medicine-cta" type="button">Lấy thuốc</button>

        <button id="voiceButton" class="home-tool voice-home-button" type="button" aria-label="Bật đàm thoại">
          <span class="icon-slot voice-icon-slot">
            <img src="/robot/static/assets/Icon/Mic.png" alt="" data-optional-icon />
          </span>
          <span>Đàm thoại</span>
        </button>
      </section>

      <section id="guideListScreen" class="screen guide-list-screen" data-screen="guide-list" aria-label="Hướng dẫn sử dụng">
        <div class="inner-panel guide-panel">
          <button class="close-button" type="button" data-close aria-label="Đóng hướng dẫn">×</button>
          <h2>Hướng dẫn sử dụng</h2>
          <div class="guide-options">
            <button type="button" data-guide-title="Hướng dẫn lấy thuốc">
              <span class="icon-slot play-icon-slot" aria-hidden="true">
                <img src="/robot/static/assets/Icon/Play.png" alt="" data-optional-icon />
              </span>
              <span>Hướng dẫn lấy thuốc</span>
            </button>
            <button type="button" data-guide-title="Hướng dẫn đàm thoại với AI">
              <span class="icon-slot play-icon-slot" aria-hidden="true">
                <img src="/robot/static/assets/Icon/Play.png" alt="" data-optional-icon />
              </span>
              <span>Hướng dẫn đàm thoại với AI</span>
            </button>
            <button type="button" data-guide-title="Hướng dẫn sử dụng 1">
              <span class="icon-slot play-icon-slot" aria-hidden="true">
                <img src="/robot/static/assets/Icon/Play.png" alt="" data-optional-icon />
              </span>
              <span>Hướng dẫn sử dụng 1</span>
            </button>
            <button type="button" data-guide-title="Hướng dẫn sử dụng 2">
              <span class="icon-slot play-icon-slot" aria-hidden="true">
                <img src="/robot/static/assets/Icon/Play.png" alt="" data-optional-icon />
              </span>
              <span>Hướng dẫn sử dụng 2</span>
            </button>
          </div>
        </div>
      </section>

      <section id="guideDetailScreen" class="screen guide-detail-screen" data-screen="guide-detail" aria-label="Chi tiết hướng dẫn">
        <div class="inner-panel video-panel">
          <button class="close-button" type="button" data-close aria-label="Đóng video hướng dẫn">×</button>
          <h2 id="guideDetailTitle">Hướng dẫn lấy thuốc</h2>
          <div class="video-placeholder" role="img" aria-label="Khu vực video hướng dẫn">Video</div>
        </div>
      </section>

      <section id="medicineChoiceScreen" class="screen medicine-choice-screen" data-screen="medicine" aria-label="Lấy thuốc">
        <button class="close-button" type="button" data-close aria-label="Đóng lấy thuốc">×</button>
        <h2>Lấy thuốc</h2>
        <p id="medicineError" class="screen-error" role="alert" hidden></p>
        <div class="medicine-actions">
          <button id="manualMedicineButton" class="medicine-action" type="button" aria-label="Nhập mã lấy thuốc">
            <span class="icon-slot medicine-icon-slot">
              <img src="/robot/static/assets/Icon/QR.png" alt="" data-optional-icon />
            </span>
            <span>Nhập</span>
          </button>
          <button id="qrMedicineButton" class="medicine-action" type="button" aria-label="Quét QR lấy thuốc">
            <span class="icon-slot medicine-icon-slot">
              <img src="/robot/static/assets/Icon/QR.png" alt="" data-optional-icon />
            </span>
            <span>Quét QR</span>
          </button>
        </div>
      </section>

      <section id="manualScreen" class="screen manual-screen" data-screen="manual" aria-label="Nhập mã lấy thuốc">
        <button class="close-button" type="button" data-close aria-label="Đóng nhập mã">×</button>
        <h2>Lấy thuốc</h2>
        <output id="medicineCodeDisplay" class="code-display" aria-label="Mã lấy thuốc"></output>
        <p id="manualError" class="screen-error" role="alert" hidden></p>
        <div class="keypad" aria-label="Bàn phím nhập mã">
          <button type="button" data-digit="1">1</button>
          <button type="button" data-digit="2">2</button>
          <button type="button" data-digit="3">3</button>
          <button type="button" data-digit="4">4</button>
          <button type="button" data-digit="5">5</button>
          <button type="button" data-digit="6">6</button>
          <button type="button" data-digit="7">7</button>
          <button type="button" data-digit="8">8</button>
          <button type="button" data-digit="9">9</button>
          <button type="button" data-action="delete" aria-label="Xóa một số">
            <img src="/robot/static/assets/delete.png" alt="" data-optional-icon />
            <span class="key-fallback">Xóa</span>
          </button>
          <button type="button" data-digit="0">0</button>
          <button type="button" data-action="confirm" aria-label="Xác nhận mã">
            <img src="/robot/static/assets/confirm.png" alt="" data-optional-icon />
            <span class="key-fallback">OK</span>
          </button>
        </div>
      </section>

      <section id="qrScreen" class="screen qr-screen" data-screen="qr" aria-label="Quét QR lấy thuốc">
        <button class="close-button" type="button" data-close aria-label="Đóng quét QR">×</button>
        <h2>Lấy thuốc</h2>
        <div class="camera-frame">
          <video id="qrVideo" muted playsinline></video>
          <div id="cameraPlaceholder" class="camera-placeholder">CAMERA</div>
        </div>
        <canvas id="qrCanvas" hidden></canvas>
        <p id="qrStatus" class="screen-error camera-status" role="status">Đưa mã QR vào giữa khung camera</p>
        <button id="qrFallbackButton" class="fallback-button" type="button" hidden>Nhập mã</button>
      </section>

      <section id="doctorScreen" class="screen doctor-screen" data-screen="doctor" aria-label="Bác sĩ">
        <button class="settings-icon" type="button" aria-label="Cài đặt bác sĩ">
          <span class="icon-slot settings-icon-slot">
            <img src="/robot/static/assets/settings.png" alt="" data-optional-icon />
          </span>
        </button>
        <button class="close-button" type="button" data-close aria-label="Đóng bác sĩ">×</button>
        <h2>Bác sĩ</h2>
      </section>

      <section id="loadingScreen" class="screen loading-screen" data-screen="loading" aria-label="Đang lấy thuốc">
        <button class="close-button" type="button" data-close aria-label="Hủy lấy thuốc">×</button>
        <h2>Lấy thuốc</h2>
        <div class="spinner" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="loading-status">Vui lòng chờ trong giây lát</p>
      </section>
    </main>

    <section id="voiceOverlay" class="voice-overlay" role="dialog" aria-modal="true" aria-label="Đàm thoại với AI" hidden>
      <button id="closeVoiceButton" class="voice-close-button" type="button" aria-label="Tắt đàm thoại">×</button>
      <div id="voiceEmoji" class="voice-emoji" data-expression="happy" aria-hidden="true">
        <div class="bot-face">
          <span class="bot-brow bot-brow-left"></span>
          <span class="bot-brow bot-brow-right"></span>
          <span class="bot-expression-mark bot-expression-mark-left"></span>
          <span class="bot-expression-mark bot-expression-mark-right"></span>
          <span class="bot-cheek bot-cheek-left"></span>
          <span class="bot-cheek bot-cheek-right"></span>
          <div class="bot-eye bot-eye-left">
            <span class="bot-pupil"></span>
          </div>
          <div class="bot-eye bot-eye-right">
            <span class="bot-pupil"></span>
          </div>
          <span class="bot-mouth"></span>
        </div>
      </div>
      <div id="medicineClassGrid" class="medicine-class-grid" aria-label="Chọn thuốc cần hỏi" hidden></div>
      <p id="voiceStatus" class="voice-status" aria-live="polite">Sẵn sàng nghe</p>
      <p id="voiceTranscript" class="voice-transcript" aria-live="polite"></p>
    </section>

    <script src="/robot/static/app.js?v=robot-emoji-1" defer></script>
  </body>
</html>
